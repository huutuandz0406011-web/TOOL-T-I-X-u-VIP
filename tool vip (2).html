<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>VI LONG SYSTEM PRO</title>

<style>
body{margin:0;background:black;color:#00ff9d;font-family:monospace;}
.menu{display:flex;justify-content:center;gap:10px;padding:10px;border-bottom:1px solid #00ff9d;flex-wrap:wrap;}
.menu button{padding:10px;background:black;border:1px solid #00ff9d;color:#00ff9d;}
.box{border:1px solid #00ff9d;padding:10px;margin:10px;}
input,select{width:100%;padding:10px;margin-top:10px;background:black;border:1px solid #00ff9d;color:#00ff9d;}
button{margin-top:5px;padding:8px;background:#00ff9d;border:none;color:black;}
.lock{color:red;}
iframe{width:100%;height:400px;border:none;}
.disabled{opacity:0.5;pointer-events:none;}
</style>
</head>

<body>

<div class="menu">
<button onclick="show('key')">🔐 KEY</button>
<button onclick="show('game')">🎮 GAME</button>
<button onclick="show('md5')">🔑 MD5</button>
<button onclick="show('phien')">📊 PHIÊN</button>
<button onclick="show('admin')">👑</button>
</div>

<!-- KEY -->
<div id="key" class="box">
<h3>KÍCH HOẠT</h3>
<input id="userKey" placeholder="Nhập key">
<button onclick="saveKey()">KÍCH HOẠT</button>
<div id="keyStatus"></div>

<div id="countdown" style="margin-top:10px"></div>

<h4>Mua key</h4>
<input id="buyerKey" placeholder="Nhập key muốn tạo">
<select id="goi">
<option value="1d">1 ngày</option>
<option value="7d">7 ngày</option>
<option value="15d">15 ngày</option>
<option value="30d">30 ngày</option>
</select>
<button onclick="requestBuy()">GỬI</button>
<div id="buyStatus"></div>

<h4>🎁 Key free</h4>
<button onclick="getFreeKey()">LẤY KEY FREE</button>
<div id="freeStatus"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="box" style="display:none;">
<input id="adminPass" placeholder="Mật khẩu">
<button onclick="login()">LOGIN</button>
<div id="adminPanel" style="display:none;">
<div id="requestList"></div>
</div>
</div>

<!-- GAME -->
<div id="game" class="box" style="display:none;">
<input id="gameInput" placeholder="Nhập web (vd: google.com)">
<button id="btnGame" onclick="runGame()">RUN</button>
<div id="lockGame" class="lock"></div>
<iframe id="gameFrame"></iframe>
</div>

<!-- MD5 -->
<div id="md5" class="box" style="display:none;">
<input id="md5Input" placeholder="Nhập 32 ký tự MD5 để phân tích">
<button id="btnMD5" onclick="runMD5()">CHECK</button>
<div id="lockMD5" class="lock"></div>
<div id="resultBig"></div>
</div>

<!-- PHIÊN -->
<div id="phien" class="box" style="display:none;">
<div style="color:orange">🔧 Đang bảo trì</div>
</div>

<script>

/* MENU */
function show(tab){
["key","admin","game","md5","phien"].forEach(i=>{
document.getElementById(i).style.display="none";
});
document.getElementById(tab).style.display="block";
}

/* DB */
function getDB(n){return JSON.parse(localStorage.getItem(n)||"[]");}
function saveDB(n,d){localStorage.setItem(n,JSON.stringify(d));}

/* KEY */
function saveKey(){
let key=userKey.value;
let keys=[...getDB("KEYS"),...getDB("FREE_KEYS")];

let f = keys.find(k=>k.key===key);

if(f){
if(Date.now()>f.expire){
keyStatus.innerText="❌ Hết hạn";
return;
}
localStorage.setItem("USER_KEY",key);
keyStatus.innerText="✔ Thành công";
updateLockUI();
}else keyStatus.innerText="❌ Sai key";
}

function checkKey(){
let key=localStorage.getItem("USER_KEY");
let keys=[...getDB("KEYS"),...getDB("FREE_KEYS")];
let f=keys.find(k=>k.key===key);

if(!f) return false;

if(Date.now()>f.expire){
localStorage.removeItem("USER_KEY");
return false;
}
return true;
}

/* TIME XỊN */
function updateCountdown(){
let key = localStorage.getItem("USER_KEY");
let keys = [...getDB("KEYS"), ...getDB("FREE_KEYS")];

let f = keys.find(k=>k.key===key);

if(!f || !f.expire){
countdown.innerText="";
return;
}

let t = f.expire - Date.now();

if(t <= 0){
countdown.innerHTML = "<span style='color:red'>❌ KEY HẾT HẠN</span>";
localStorage.removeItem("USER_KEY");
updateLockUI();
return;
}

let s = Math.floor(t/1000);
let h = Math.floor(s/3600);
let m = Math.floor((s%3600)/60);
let sec = s%60;

let timeText = `${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}:${sec.toString().padStart(2,"0")}`;

if(!f.start) f.start = Date.now();
let total = f.expire - f.start;
let percent = Math.max(0, Math.min(100, (t/total)*100));

let color = percent > 50 ? "#00ff9d" : percent > 20 ? "yellow" : "red";

countdown.innerHTML = `
<div style="color:${color}">⏳ ${timeText}</div>
<div style="width:100%;background:#111;border:1px solid #00ff9d;margin-top:5px">
<div style="width:${percent}%;height:8px;background:${color}"></div>
</div>`;
}

/* LOCK */
function updateLockUI(){
let ok=checkKey();

["btnGame","btnMD5"].forEach(id=>{
let b=document.getElementById(id);
if(b) b.classList.toggle("disabled",!ok);
});

lockGame.innerText = ok?"":"🔒";
lockMD5.innerText = ok?"":"🔒";
}

/* AUTO */
setInterval(()=>{
checkKey();
updateCountdown();
updateLockUI();
},1000);

/* REQUEST */
function requestBuy(){
let list=getDB("REQUEST");
list.push({key:buyerKey.value,goi:goi.value,status:"pending"});
saveDB("REQUEST",list);
buyStatus.innerText="✔ Đã gửi";
}

/* ADMIN */
const PASS="123456";

function login(){
if(adminPass.value===PASS){
adminPanel.style.display="block";
loadRequests();
}
}

function loadRequests(){
let list=getDB("REQUEST");
let html="";
list.forEach((r,i)=>{
html+=`
<div>
🔑 ${r.key} - ${r.goi}
${r.status==="pending"?`
<button onclick="approve(${i})">✔</button>
<button onclick="reject(${i})">❌</button>`:
r.status==="done"?"✔":"❌"}
</div>`;
});
requestList.innerHTML=html;
}

function approve(i){
let req=getDB("REQUEST");
let keys=getDB("KEYS");

let k=req[i].key;

let goi=req[i].goi;
let expire;

if(goi==="1d") expire=Date.now()+86400000;
if(goi==="7d") expire=Date.now()+7*86400000;
if(goi==="15d") expire=Date.now()+15*86400000;
if(goi==="30d") expire=Date.now()+30*86400000;

keys.push({key:k,expire,start:Date.now()});
saveDB("KEYS",keys);

req[i].status="done";
saveDB("REQUEST",req);
loadRequests();
}

function reject(i){
let req=getDB("REQUEST");
req[i].status="cancel";
saveDB("REQUEST",req);
loadRequests();
}

/* FREE */
function getFreeKey(){
let k="FREE-"+Math.random().toString(36).substr(2,6).toUpperCase();

let free=getDB("FREE_KEYS");
free.push({
key:k,
expire: Date.now()+86400000,
start: Date.now()
});

saveDB("FREE_KEYS",free);

userKey.value=k;
freeStatus.innerText="✔ "+k;
}

/* GAME */
function runGame(){
if(!checkKey()) return;

let url = gameInput.value.trim();
if(!url.startsWith("http")) url = "https://" + url;

localStorage.setItem("LAST_GAME", url);
gameFrame.src = url;
}

let lastGame = localStorage.getItem("LAST_GAME");
if(lastGame){
gameInput.value = lastGame.replace("https://","");
gameFrame.src = lastGame;
}

/* MD5 */
function runMD5(){
if(!checkKey()) return;
resultBig.innerText="✔ Đã nhận MD5";
}

</script>

</body>
</html>
